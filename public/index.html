<!DOCTYPE html>
<html lang="ja"><head><meta http-equiv="Content-Type" content="text/html; charset=UTF-8">

  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ダウトゲーム with ベッティング</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f8f8f7;
      color: #1a1a19;
      line-height: 1.6;
    }

    @media (prefers-color-scheme: dark) {
      body {
        background: #1a1a19;
        color: #ffffff;
      }
    }

    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    input[type="number"],
    input[type="range"],
    input[type="text"] {
      font-family: inherit;
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    const MAX_PLAYERS = 8;

    // クライアント側のローカルUI状態（ゲームの正データはすべてサーバーが持つ）
    const client = {
      socket: io(),
      screen: 'lobby',   // lobby | waiting | game
      roomCode: '',
      playerId: null,
      playerName: '',
      error: '',
      state: null,       // サーバーから受け取った最新のルーム状態
    };

    client.socket.on('stateUpdate', (state) => {
      client.state = state;
      if (state.gameState === 'waiting') {
        client.screen = 'waiting';
      } else {
        client.screen = 'game';
      }
      render();
    });

    client.socket.on('connect_error', () => {
      client.error = 'サーバーに接続できませんでした';
      render();
    });

    client.socket.on('disconnect', () => {
      client.error = 'サーバーとの接続が切れました。ページを再読み込みしてください。';
      render();
    });

    function render() {
      const root = document.getElementById('root');
      root.innerHTML = '';
      if (client.screen === 'lobby') {
        renderLobby(root);
      } else if (client.screen === 'waiting') {
        renderWaiting(root);
      } else {
        renderGame(root);
      }
    }

    function renderLobby(root) {
      const div = document.createElement('div');
      div.style.cssText = 'padding:2rem;max-width:700px;margin:0 auto;';
      div.innerHTML = `
        <h1 style="font-size:36px;font-weight:700;margin-bottom:0.5rem;text-align:center;">🎲 ダウトゲーム</h1>
        <p style="text-align:center;margin-bottom:2rem;color:#666;font-size:14px;">競馬風のオッズシステムを搭載したベッティングゲーム</p>

        <div style="margin-bottom:2rem;padding:1.5rem;background:#e8f4f8;border-radius:12px;border-left:4px solid #2a78d6;">
          <h2 style="font-size:16px;font-weight:600;margin-bottom:1rem;color:#1f5cab;">📋 ゲームルール</h2>
          <ul style="margin:0;padding-left:1.5rem;color:#333;font-size:13px;line-height:1.8;">
            <li style="margin-bottom:0.5rem;"><strong>基本:</strong> 各ラウンド、主張が「本当」か「ウソ」かを予想して賭ける</li>
            <li style="margin-bottom:0.5rem;"><strong>初期資金:</strong> 全プレイヤーが $100 から開始</li>
            <li style="margin-bottom:0.5rem;"><strong>ベッティング:</strong> 順番に $1～$100 の間で自由に賭ける</li>
            <li style="margin-bottom:0.5rem;"><strong>オッズ:</strong> 少ない投票額ほど高オッズ（競馬方式）</li>
            <li style="margin-bottom:0.5rem;"><strong>配当:</strong> 正解 = ベット額 × オッズ、不正解 = ベット失失</li>
            <li style="margin-bottom:0.5rem;"><strong>終了条件:</strong> アクティブプレイヤーが2人以下になるまで継続</li>
            <li><strong>人数:</strong> 2～8人でプレイ可能</li>
          </ul>
        </div>

        <div style="margin-bottom:1.5rem;padding:1.5rem;background:#fff;border:1px solid #e0e0e0;border-radius:12px;">
          <h3 style="font-size:14px;font-weight:600;margin-bottom:1rem;color:#666;">👤 プレイヤー名を入力</h3>
          <input type="text" id="playerNameInput" placeholder="あなたの名前" maxlength="20" value="${client.playerName}" style="width:100%;padding:12px;margin-bottom:1rem;font-size:16px;border-radius:8px;border:1px solid #ddd;"/>
          <button id="createRoomBtn" style="width:100%;padding:14px;font-size:16px;font-weight:600;background:#2a78d6;color:white;border:none;border-radius:8px;cursor:pointer;">🆕 部屋を作る</button>
        </div>

        <div style="margin-bottom:1.5rem;padding:1.5rem;background:#fff;border:1px solid #e0e0e0;border-radius:12px;">
          <h3 style="font-size:14px;font-weight:600;margin-bottom:1rem;color:#666;">🔑 ルームコードで参加</h3>
          <input type="text" id="roomCodeInput" placeholder="例：AB12CD" maxlength="6" style="width:100%;padding:12px;margin-bottom:1rem;font-size:16px;letter-spacing:2px;text-transform:uppercase;border-radius:8px;border:1px solid #ddd;"/>
          <button id="joinRoomBtn" style="width:100%;padding:14px;font-size:16px;font-weight:600;background:#28a745;color:white;border:none;border-radius:8px;cursor:pointer;">→ 部屋に参加する</button>
        </div>

        ${client.error ? `<p style="text-align:center;color:#dc3545;font-size:14px;">${client.error}</p>` : ''}
      `;
      root.appendChild(div);

      const nameInput = document.getElementById('playerNameInput');
      const codeInput = document.getElementById('roomCodeInput');

      function getName() {
        const name = nameInput.value.trim();
        if (!name) {
          alert('名前を入力してください');
          return null;
        }
        client.playerName = name;
        return name;
      }

      document.getElementById('createRoomBtn').addEventListener('click', () => {
        const name = getName();
        if (!name) return;
        client.socket.emit('createRoom', { playerName: name }, (res) => {
          if (!res.ok) {
            client.error = res.error;
            render();
            return;
          }
          client.error = '';
          client.roomCode = res.roomCode;
          client.playerId = res.playerId;
          client.state = res.state;
          client.screen = 'waiting';
          render();
        });
      });

      document.getElementById('joinRoomBtn').addEventListener('click', () => {
        const name = getName();
        if (!name) return;
        const code = codeInput.value.trim().toUpperCase();
        if (!code) {
          alert('ルームコードを入力してください');
          return;
        }
        client.socket.emit('joinRoom', { roomCode: code, playerName: name }, (res) => {
          if (!res.ok) {
            client.error = res.error;
            render();
            return;
          }
          client.error = '';
          client.roomCode = res.roomCode;
          client.playerId = res.playerId;
          client.state = res.state;
          client.screen = 'waiting';
          render();
        });
      });

      [nameInput, codeInput].forEach((el) => {
        el.addEventListener('keypress', (e) => {
          if (e.key === 'Enter') document.getElementById('createRoomBtn').click();
        });
      });
    }

    function renderWaiting(root) {
      const state = client.state;
      const players = state.playerOrder.map((id) => state.players[id]).filter(Boolean);
      const isHost = state.hostId === client.playerId;

      const div = document.createElement('div');
      div.style.cssText = 'padding:2rem;max-width:600px;margin:0 auto;';
      div.innerHTML = `
        <h1 style="font-size:28px;font-weight:600;margin-bottom:2rem;text-align:center;">🎲 ゲーム準備中</h1>

        <div style="margin-bottom:2rem;padding:1.5rem;background:#fff;border:1px solid #e0e0e0;border-radius:12px;">
          <p style="color:#666;margin:0 0 0.5rem 0;font-size:14px;">ルームコード</p>
          <div style="padding:1rem;background:#f8f8f7;border-radius:8px;text-align:center;">
            <p style="font-size:36px;font-weight:700;margin:0;letter-spacing:2px;color:#2a78d6;">${state.roomCode}</p>
            <p style="color:#999;margin:0.5rem 0 0 0;font-size:12px;">このコードを他のプレイヤーに共有してください</p>
          </div>
        </div>

        <div style="margin-bottom:2rem;padding:1.5rem;background:#fff;border:1px solid #e0e0e0;border-radius:12px;">
          <h3 style="font-size:14px;font-weight:600;margin-bottom:1rem;color:#666;">参加プレイヤー (${players.length}/${MAX_PLAYERS})</h3>
          <div style="display:grid;gap:8px;">
            ${players.map((p) => `
              <div style="padding:12px;background:${p.id === client.playerId ? '#e3f2fd' : '#f8f8f7'};border-radius:8px;border:${p.id === client.playerId ? '2px solid #2a78d6' : '1px solid #e0e0e0'};">
                <span style="font-weight:${p.id === client.playerId ? '600' : '400'};color:${p.id === client.playerId ? '#1f5cab' : '#333'};">${p.name}${p.id === client.playerId ? ' (あなた)' : ''}${p.id === state.hostId ? ' 👑' : ''}</span>
              </div>
            `).join('')}
          </div>
        </div>

        ${isHost
          ? `<button id="startGameBtn" style="width:100%;padding:14px;font-size:16px;font-weight:600;background:#2a78d6;color:white;border:none;border-radius:8px;cursor:${players.length >= 2 ? 'pointer' : 'not-allowed'};opacity:${players.length >= 2 ? 1 : 0.5};" ${players.length >= 2 ? '' : 'disabled'}>ゲーム開始 →</button>`
          : `<p style="text-align:center;color:#999;font-size:14px;">部屋の作成者がゲームを開始するのを待っています…</p>`
        }
      `;

      root.appendChild(div);

      if (isHost) {
        document.getElementById('startGameBtn').addEventListener('click', () => {
          if (players.length >= 2) {
            client.socket.emit('startGame');
          }
        });
      }
    }

    function renderGame(root) {
      const state = client.state;
      const list = state.playerOrder.map((id) => state.players[id]).filter(Boolean);
      const div = document.createElement('div');
      div.style.cssText = 'padding:2rem;max-width:900px;margin:0 auto;';

      const current = list[state.currentPlayerIdx];
      const activePlayers = list.filter((p) => p.status === 'active');
      const totalBet = Object.values(state.bets).reduce((a, b) => a + b, 0);
      const isYourTurn = client.playerId === current.id;
      const myPlayer = state.players[client.playerId];

      let html = `
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:2rem;border-bottom:1px solid #e0e0e0;padding-bottom:1rem;">
          <div>
            <h1 style="font-size:24px;font-weight:600;margin:0;">🎲 ラウンド ${state.round}</h1>
            <p style="color:#666;margin:4px 0 0 0;font-size:14px;">${activePlayers.length} / ${list.length} プレイヤー · ルーム ${state.roomCode}</p>
          </div>
          <div style="text-align:right;">
            <div style="background:#fff3cd;padding:12px 16px;border-radius:8px;margin-bottom:8px;">
              <p style="color:#666;margin:0 0 4px 0;font-size:12px;">賭け総額</p>
              <p style="font-size:20px;font-weight:600;margin:0;">$${totalBet}</p>
            </div>
            <div style="background:${myPlayer.status === 'active' ? '#e3f2fd' : '#f8f8f7'};padding:12px 16px;border-radius:8px;">
              <p style="color:#666;margin:0 0 4px 0;font-size:12px;">あなたの残高</p>
              <p style="font-size:20px;font-weight:600;margin:0;">$${myPlayer.bankroll}</p>
            </div>
          </div>
        </div>

        <div style="margin-bottom:2rem;">
          <h2 style="font-size:13px;color:#999;margin-bottom:12px;font-weight:600;text-transform:uppercase;">プレイヤー</h2>
          <div style="display:grid;grid-template-columns:repeat(auto-fit, minmax(140px, 1fr));gap:12px;">
      `;

      list.forEach((p) => {
        const isCurrentPlayer = p.id === current.id;
        const isYouPlayer = p.id === client.playerId;
        html += `<div style="padding:14px;background:${isCurrentPlayer ? '#e3f2fd' : '#fff'};border:${isCurrentPlayer ? '2px solid #2a78d6' : isYouPlayer ? '2px solid #ffc107' : '1px solid #e0e0e0'};border-radius:8px;opacity:${p.status === 'broke' ? 0.5 : 1};box-shadow:${isCurrentPlayer ? '0 2px 8px rgba(42, 120, 214, 0.2)' : isYouPlayer ? '0 2px 8px rgba(255, 193, 7, 0.2)' : 'none'};"><p style="margin:0 0 6px 0;font-size:12px;color:#999;">${p.name}${isYouPlayer ? ' (あなた)' : ''}${isCurrentPlayer ? ' (ターン中)' : ''}</p><p style="margin:0;font-size:18px;font-weight:600;">$${p.bankroll}</p>${state.bets[p.id] ? `<p style="margin:6px 0 0 0;font-size:12px;color:#d9534f;font-weight:500;">BET: $${state.bets[p.id]}</p>` : ''}${p.status === 'broke' ? `<p style="margin:6px 0 0 0;font-size:11px;color:#999;">💔 破産</p>` : ''}</div>`;
      });

      html += `</div></div>`;

      if (Object.keys(state.odds).length > 0) {
        html += `<div style="margin-bottom:2rem;padding:16px;background:#fff;border:1px solid #e0e0e0;border-radius:8px;"><h2 style="font-size:13px;color:#999;margin:0 0 12px 0;font-weight:600;text-transform:uppercase;">🏇 現在のオッズ</h2><div style="display:grid;grid-template-columns:repeat(auto-fit, minmax(110px, 1fr));gap:12px;">`;
        list.forEach((p) => {
          html += `<div style="font-size:13px;padding:8px;background:#f8f8f7;border-radius:6px;"><span style="color:#999;">${p.name}</span><br/><span style="font-size:16px;font-weight:600;color:${state.odds[p.id] !== '-' ? '#d9534f' : '#999'};">${state.odds[p.id] !== '-' ? state.odds[p.id] + 'x' : '未ベット'}</span></div>`;
        });
        html += `</div></div>`;
      }

      if (state.gameState === 'betting') {
        html += `<div style="margin-bottom:2rem;padding:20px;background:${isYourTurn ? '#e3f2fd' : '#f8f8f7'};border-radius:8px;border:${isYourTurn ? '2px solid #2a78d6' : '1px solid #e0e0e0'};"><h2 style="margin:0 0 12px 0;font-size:18px;font-weight:600;color:${isYourTurn ? '#1f5cab' : '#999'};">💰 ${current.name}${isYourTurn ? ' (あなたのターン)' : ''}</h2>`;

        if (isYourTurn) {
          html += `<p style="color:#1f5cab;margin:0 0 16px 0;font-size:14px;">残高: $${current.bankroll}</p><input type="number" min="1" max="${current.bankroll}" value="${state.currentBet || ''}" id="betInput" placeholder="ベット額を入力" style="width:100%;padding:10px;margin-bottom:12px;font-size:16px;border-radius:6px;border:1px solid #90caf9;"/><div style="display:grid;grid-template-columns:repeat(5, 1fr);gap:8px;margin-bottom:16px;">`;
          [10, 25, 50, 75, 100].forEach((amt) => {
            html += `<button class="bet-btn" data-amount="${amt}" style="padding:10px;font-size:13px;font-weight:600;background:white;border:1px solid #2a78d6;color:#2a78d6;border-radius:6px;cursor:pointer;opacity:${amt > current.bankroll ? 0.5 : 1};" ${amt > current.bankroll ? 'disabled' : ''}>$${amt}</button>`;
          });
          html += `</div><button id="nextPlayerBtn" style="width:100%;padding:12px;font-size:16px;font-weight:600;background:#2a78d6;color:white;border:none;border-radius:6px;cursor:${state.currentBet ? 'pointer' : 'not-allowed'};opacity:${state.currentBet ? 1 : 0.5};" ${state.currentBet ? '' : 'disabled'}>ベット確定 →</button>`;
        } else {
          html += `<p style="color:#999;margin:0;font-size:14px;">他のプレイヤーのターンです。しばらくお待ちください...</p>`;
        }

        html += `</div>`;
      }

      if (state.gameState === 'reveal' && !state.revealed) {
        html += `<div style="margin-bottom:2rem;padding:20px;background:#fff;border:2px solid #ffc107;border-radius:8px;"><h2 style="margin:0 0 16px 0;font-size:18px;font-weight:600;">🎯 主張を選んでください</h2><div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px;"><button id="claimTrue" style="padding:18px;font-size:16px;font-weight:600;background:#d4edda;color:#155724;border:2px solid #28a745;border-radius:8px;cursor:pointer;">✓ 本当</button><button id="claimFalse" style="padding:18px;font-size:16px;font-weight:600;background:#f8d7da;color:#721c24;border:2px solid #dc3545;border-radius:8px;cursor:pointer;">✕ ウソ</button></div>${state.claim ? `<button id="revealBtn" style="width:100%;padding:12px;font-size:16px;font-weight:600;background:#ffc107;color:#000;border:none;border-radius:6px;cursor:pointer;">🎬 結果を発表</button>` : ''}</div>`;
      }

      if (state.revealed) {
        const bgColor = state.isCorrect ? '#d4edda' : '#f8d7da';
        const borderColor = state.isCorrect ? '#28a745' : '#dc3545';
        const textColor = state.isCorrect ? '#155724' : '#721c24';
        html += `<div style="margin-bottom:2rem;padding:24px;background:${bgColor};border:3px solid ${borderColor};border-radius:8px;text-align:center;"><h2 style="margin:0 0 12px 0;font-size:24px;font-weight:600;color:${textColor};">${state.isCorrect ? '🎉 主張は正しかった！' : '🔄 主張はウソだった！'}</h2><p style="margin:0 0 20px 0;color:${textColor};font-size:15px;">${state.message}</p><div style="margin-bottom:16px;padding:12px;background:rgba(255,255,255,0.7);border-radius:6px;"><h3 style="margin:0 0 12px 0;font-size:13px;color:#666;text-transform:uppercase;">ラウンド結果</h3><div style="display:grid;grid-template-columns:repeat(auto-fit, minmax(120px, 1fr));gap:8px;">`;
        list.forEach((p) => {
          const bet = state.bets[p.id] || 0;
          const oddsValue = parseFloat(state.odds[p.id]) || 1;
          let result = 0;
          if (bet > 0) {
            result = state.isCorrect ? Math.round(bet * oddsValue) : -bet;
          }
          html += `<div style="font-size:12px;padding:8px;background:${result > 0 ? '#c8e6c9' : result < 0 ? '#ffcdd2' : '#f5f5f5'};border-radius:6px;"><span style="color:#999;">${p.name}</span><br/><span style="font-size:14px;font-weight:600;color:${result > 0 ? '#2e7d32' : result < 0 ? '#c62828' : '#999'};">${result > 0 ? '+' : ''}${result}</span></div>`;
        });
        html += `</div></div><button id="nextRoundBtn" style="padding:12px 24px;font-size:16px;font-weight:600;background:${textColor};color:white;border:none;border-radius:6px;cursor:pointer;">次のラウンド →</button></div>`;
      }

      if (state.message && !state.revealed) {
        html += `<div style="padding:12px;background:#fff;border:1px solid #e0e0e0;border-radius:6px;text-align:center;"><p style="margin:0;color:#666;font-size:14px;">${state.message}</p></div>`;
      }

      div.innerHTML = html;
      root.appendChild(div);

      if (state.gameState === 'betting' && isYourTurn) {
        let pendingBet = state.currentBet || 0;
        const betInput = document.getElementById('betInput');
        betInput.addEventListener('change', (e) => { pendingBet = Number(e.target.value); });
        document.querySelectorAll('.bet-btn').forEach((btn) => {
          btn.addEventListener('click', () => {
            client.socket.emit('placeBet', Number(btn.dataset.amount));
          });
        });
        document.getElementById('nextPlayerBtn').addEventListener('click', () => {
          if (!state.currentBet && pendingBet) {
            client.socket.emit('placeBet', pendingBet);
          }
          client.socket.emit('nextPlayer');
        });
      }

      if (state.gameState === 'reveal' && !state.revealed) {
        document.getElementById('claimTrue').addEventListener('click', () => { client.socket.emit('makeClaim', '本当'); });
        document.getElementById('claimFalse').addEventListener('click', () => { client.socket.emit('makeClaim', 'ウソ'); });
        if (document.getElementById('revealBtn')) {
          document.getElementById('revealBtn').addEventListener('click', () => { client.socket.emit('reveal'); });
        }
      }

      if (state.revealed && document.getElementById('nextRoundBtn')) {
        document.getElementById('nextRoundBtn').addEventListener('click', () => { client.socket.emit('nextRound'); });
      }
    }

    render();
  </script>
</body>
</html>
