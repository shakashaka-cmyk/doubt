<!DOCTYPE html>
<html lang="ja"><head><meta http-equiv="Content-Type" content="text/html; charset=UTF-8">

  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ダウトゲーム with ベッティング</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f8f8f7;
      color: #1a1a19;
      line-height: 1.6;
    }

    @media (prefers-color-scheme: dark) {
      body {
        background: #1a1a19;
        color: #ffffff;
      }
    }

    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    input[type="number"],
    input[type="range"],
    input[type="text"] {
      font-family: inherit;
    }

    .side-btn.selected {
      outline: 3px solid #2a78d6;
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    const MAX_PLAYERS = 8;

    // クライアント側のローカルUI状態（ゲームの正データはすべてサーバーが持つ）
    const client = {
      socket: io(),
      screen: 'lobby',   // lobby | waiting | game
      roomCode: '',
      playerId: null,
      playerName: '',
      error: '',
      state: null,       // サーバーから受け取った最新のルーム状態
      pendingSide: null, // ベット入力中に選んでいる本当/ウソ（未送信）
    };

    client.socket.on('stateUpdate', (state) => {
      client.state = state;
      client.screen = state.gameState === 'waiting' ? 'waiting' : 'game';
      render();
    });

    client.socket.on('connect_error', () => {
      client.error = 'サーバーに接続できませんでした';
      render();
    });

    client.socket.on('disconnect', () => {
      client.error = 'サーバーとの接続が切れました。ページを再読み込みしてください。';
      render();
    });

    function render() {
      const root = document.getElementById('root');
      root.innerHTML = '';
      if (client.screen === 'lobby') {
        renderLobby(root);
      } else if (client.screen === 'waiting') {
        renderWaiting(root);
      } else {
        renderGame(root);
      }
    }

    function renderLobby(root) {
      const div = document.createElement('div');
      div.style.cssText = 'padding:2rem;max-width:700px;margin:0 auto;';
      div.innerHTML = `
        <h1 style="font-size:36px;font-weight:700;margin-bottom:0.5rem;text-align:center;">🎲 ダウトゲーム</h1>
        <p style="text-align:center;margin-bottom:2rem;color:#666;font-size:14px;">対面で遊ぶ、エピソード当てベッティングゲーム</p>

        <div style="margin-bottom:2rem;padding:1.5rem;background:#e8f4f8;border-radius:12px;border-left:4px solid #2a78d6;">
          <h2 style="font-size:16px;font-weight:600;margin-bottom:1rem;color:#1f5cab;">📋 ゲームルール</h2>
          <ul style="margin:0;padding-left:1.5rem;color:#333;font-size:13px;line-height:1.8;">
            <li style="margin-bottom:0.5rem;"><strong>役割:</strong> 毎ラウンド1人が「トークプレイヤー」になり、他の全員が「ベットプレイヤー」</li>
            <li style="margin-bottom:0.5rem;"><strong>進行:</strong> トークプレイヤーが自分のエピソードの真実（本当/ウソ）を先にこのアプリへこっそり入力</li>
            <li style="margin-bottom:0.5rem;"><strong>トーク:</strong> その場で口頭でエピソードを話す（内容はアプリに入力しません）</li>
            <li style="margin-bottom:0.5rem;"><strong>ベット:</strong> 話を聞いたベットプレイヤーは、各自のタイミングで「本当」か「ウソ」を選び、$1～$100を賭ける</li>
            <li style="margin-bottom:0.5rem;"><strong>配当:</strong> 全員のベットが揃うと自動で結果発表。正解側の合計に対して不正解側の賭け金がプール分配される（少数派が的中すると高配当）</li>
            <li style="margin-bottom:0.5rem;"><strong>トークプレイヤー:</strong> その回は賭けに参加せず、次のラウンドから別の人に交代</li>
            <li style="margin-bottom:0.5rem;"><strong>初期資金:</strong> 全プレイヤー $100 からスタート</li>
            <li><strong>終了条件:</strong> ベットに参加できるアクティブプレイヤーが1人以下になったら終了</li>
          </ul>
        </div>

        <div style="margin-bottom:1.5rem;padding:1.5rem;background:#fff;border:1px solid #e0e0e0;border-radius:12px;">
          <h3 style="font-size:14px;font-weight:600;margin-bottom:1rem;color:#666;">👤 プレイヤー名を入力</h3>
          <input type="text" id="playerNameInput" placeholder="あなたの名前" maxlength="20" value="${client.playerName}" style="width:100%;padding:12px;margin-bottom:1rem;font-size:16px;border-radius:8px;border:1px solid #ddd;"/>
          <button id="createRoomBtn" style="width:100%;padding:14px;font-size:16px;font-weight:600;background:#2a78d6;color:white;border:none;border-radius:8px;cursor:pointer;">🆕 部屋を作る</button>
        </div>

        <div style="margin-bottom:1.5rem;padding:1.5rem;background:#fff;border:1px solid #e0e0e0;border-radius:12px;">
          <h3 style="font-size:14px;font-weight:600;margin-bottom:1rem;color:#666;">🔑 ルームコードで参加</h3>
          <input type="text" id="roomCodeInput" placeholder="例：AB12CD" maxlength="6" style="width:100%;padding:12px;margin-bottom:1rem;font-size:16px;letter-spacing:2px;text-transform:uppercase;border-radius:8px;border:1px solid #ddd;"/>
          <button id="joinRoomBtn" style="width:100%;padding:14px;font-size:16px;font-weight:600;background:#28a745;color:white;border:none;border-radius:8px;cursor:pointer;">→ 部屋に参加する</button>
        </div>

        ${client.error ? `<p style="text-align:center;color:#dc3545;font-size:14px;">${client.error}</p>` : ''}
      `;
      root.appendChild(div);

      const nameInput = document.getElementById('playerNameInput');
      const codeInput = document.getElementById('roomCodeInput');

      function getName() {
        const name = nameInput.value.trim();
        if (!name) {
          alert('名前を入力してください');
          return null;
        }
        client.playerName = name;
        return name;
      }

      document.getElementById('createRoomBtn').addEventListener('click', () => {
        const name = getName();
        if (!name) return;
        client.socket.emit('createRoom', { playerName: name }, (res) => {
          if (!res.ok) {
            client.error = res.error;
            render();
            return;
          }
          client.error = '';
          client.roomCode = res.roomCode;
          client.playerId = res.playerId;
          client.state = res.state;
          client.screen = 'waiting';
          render();
        });
      });

      document.getElementById('joinRoomBtn').addEventListener('click', () => {
        const name = getName();
        if (!name) return;
        const code = codeInput.value.trim().toUpperCase();
        if (!code) {
          alert('ルームコードを入力してください');
          return;
        }
        client.socket.emit('joinRoom', { roomCode: code, playerName: name }, (res) => {
          if (!res.ok) {
            client.error = res.error;
            render();
            return;
          }
          client.error = '';
          client.roomCode = res.roomCode;
          client.playerId = res.playerId;
          client.state = res.state;
          client.screen = 'waiting';
          render();
        });
      });

      [nameInput, codeInput].forEach((el) => {
        el.addEventListener('keypress', (e) => {
          if (e.key === 'Enter') document.getElementById('createRoomBtn').click();
        });
      });
    }

    function renderWaiting(root) {
      const state = client.state;
      const players = state.playerOrder.map((id) => state.players[id]).filter(Boolean);
      const isHost = state.hostId === client.playerId;

      const div = document.createElement('div');
      div.style.cssText = 'padding:2rem;max-width:600px;margin:0 auto;';
      div.innerHTML = `
        <h1 style="font-size:28px;font-weight:600;margin-bottom:2rem;text-align:center;">🎲 ゲーム準備中</h1>

        <div style="margin-bottom:2rem;padding:1.5rem;background:#fff;border:1px solid #e0e0e0;border-radius:12px;">
          <p style="color:#666;margin:0 0 0.5rem 0;font-size:14px;">ルームコード</p>
          <div style="padding:1rem;background:#f8f8f7;border-radius:8px;text-align:center;">
            <p style="font-size:36px;font-weight:700;margin:0;letter-spacing:2px;color:#2a78d6;">${state.roomCode}</p>
            <p style="color:#999;margin:0.5rem 0 0 0;font-size:12px;">このコードを他のプレイヤーに共有してください</p>
          </div>
        </div>

        <div style="margin-bottom:2rem;padding:1.5rem;background:#fff;border:1px solid #e0e0e0;border-radius:12px;">
          <h3 style="font-size:14px;font-weight:600;margin-bottom:1rem;color:#666;">参加プレイヤー (${players.length}/${MAX_PLAYERS})</h3>
          <div style="display:grid;gap:8px;">
            ${players.map((p) => `
              <div style="padding:12px;background:${p.id === client.playerId ? '#e3f2fd' : '#f8f8f7'};border-radius:8px;border:${p.id === client.playerId ? '2px solid #2a78d6' : '1px solid #e0e0e0'};">
                <span style="font-weight:${p.id === client.playerId ? '600' : '400'};color:${p.id === client.playerId ? '#1f5cab' : '#333'};">${p.name}${p.id === client.playerId ? ' (あなた)' : ''}${p.id === state.hostId ? ' 👑' : ''}</span>
              </div>
            `).join('')}
          </div>
        </div>

        ${isHost
          ? `<button id="startGameBtn" style="width:100%;padding:14px;font-size:16px;font-weight:600;background:#2a78d6;color:white;border:none;border-radius:8px;cursor:${players.length >= 2 ? 'pointer' : 'not-allowed'};opacity:${players.length >= 2 ? 1 : 0.5};" ${players.length >= 2 ? '' : 'disabled'}>ゲーム開始 →</button>`
          : `<p style="text-align:center;color:#999;font-size:14px;">部屋の作成者がゲームを開始するのを待っています…</p>`
        }
      `;

      root.appendChild(div);

      if (isHost) {
        document.getElementById('startGameBtn').addEventListener('click', () => {
          if (players.length >= 2) {
            client.socket.emit('startGame');
          }
        });
      }
    }

    function playerBadges(p, state) {
      const isYou = p.id === client.playerId;
      const isTeller = p.id === state.storytellerId;
      let badge = '';
      if (isTeller) badge += ' 🗣️トーク中';
      if (isYou) badge += ' (あなた)';
      if (p.status === 'broke') badge += ' 💔破産';
      return badge;
    }

    function renderPlayerGrid(state) {
      const list = state.playerOrder.map((id) => state.players[id]).filter(Boolean);
      let html = `<div style="margin-bottom:2rem;"><h2 style="font-size:13px;color:#999;margin-bottom:12px;font-weight:600;text-transform:uppercase;">プレイヤー</h2><div style="display:grid;grid-template-columns:repeat(auto-fit, minmax(150px, 1fr));gap:12px;">`;
      list.forEach((p) => {
        const isTeller = p.id === state.storytellerId;
        const isYou = p.id === client.playerId;
        const bet = state.bets[p.id];
        html += `<div style="padding:14px;background:${isTeller ? '#fff3cd' : '#fff'};border:${isTeller ? '2px solid #ffc107' : isYou ? '2px solid #2a78d6' : '1px solid #e0e0e0'};border-radius:8px;opacity:${p.status === 'broke' ? 0.5 : 1};">
          <p style="margin:0 0 6px 0;font-size:12px;color:#999;">${p.name}${playerBadges(p, state)}</p>
          <p style="margin:0;font-size:18px;font-weight:600;">$${p.bankroll}</p>
          ${bet && bet.submitted && !isTeller ? `<p style="margin:6px 0 0 0;font-size:12px;color:#2a78d6;font-weight:500;">✅ ベット済み</p>` : ''}
        </div>`;
      });
      html += `</div></div>`;
      return html;
    }

    function renderOdds(state) {
      if (!state.odds || (state.odds['本当'] === '-' && state.odds['ウソ'] === '-')) return '';
      return `<div style="margin-bottom:2rem;padding:16px;background:#fff;border:1px solid #e0e0e0;border-radius:8px;">
        <h2 style="font-size:13px;color:#999;margin:0 0 12px 0;font-weight:600;text-transform:uppercase;">🏇 現在のオッズ</h2>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
          <div style="font-size:13px;padding:8px;background:#f8f8f7;border-radius:6px;text-align:center;"><span style="color:#999;">✓ 本当</span><br/><span style="font-size:18px;font-weight:600;color:${state.odds['本当'] !== '-' ? '#d9534f' : '#999'};">${state.odds['本当'] !== '-' ? state.odds['本当'] + 'x' : '未ベット'}</span></div>
          <div style="font-size:13px;padding:8px;background:#f8f8f7;border-radius:6px;text-align:center;"><span style="color:#999;">✕ ウソ</span><br/><span style="font-size:18px;font-weight:600;color:${state.odds['ウソ'] !== '-' ? '#d9534f' : '#999'};">${state.odds['ウソ'] !== '-' ? state.odds['ウソ'] + 'x' : '未ベット'}</span></div>
        </div>
      </div>`;
    }

    function renderGame(root) {
      const state = client.state;
      const div = document.createElement('div');
      div.style.cssText = 'padding:2rem;max-width:900px;margin:0 auto;';
      const myPlayer = state.players[client.playerId];
      const isTeller = client.playerId === state.storytellerId;

      let html = `
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:2rem;border-bottom:1px solid #e0e0e0;padding-bottom:1rem;">
          <div>
            <h1 style="font-size:24px;font-weight:600;margin:0;">🎲 ラウンド ${state.round}</h1>
            <p style="color:#666;margin:4px 0 0 0;font-size:14px;">ルーム ${state.roomCode}</p>
          </div>
          <div style="background:${myPlayer.status === 'active' ? '#e3f2fd' : '#f8f8f7'};padding:12px 16px;border-radius:8px;">
            <p style="color:#666;margin:0 0 4px 0;font-size:12px;">あなたの残高</p>
            <p style="font-size:20px;font-weight:600;margin:0;">$${myPlayer.bankroll}</p>
          </div>
        </div>
      `;

      html += renderPlayerGrid(state);

      if (state.gameState === 'ended') {
        html += renderEnded(state);
        div.innerHTML = html;
        root.appendChild(div);
        return;
      }

      html += renderOdds(state);

      if (state.gameState === 'claim') {
        html += renderClaimPhase(state, isTeller, myPlayer);
      } else if (state.gameState === 'betting') {
        html += renderBettingPhase(state, isTeller, myPlayer);
      } else if (state.gameState === 'reveal') {
        html += renderRevealPhase(state);
      }

      if (state.message) {
        html += `<div style="padding:12px;background:#fff;border:1px solid #e0e0e0;border-radius:6px;text-align:center;margin-top:1rem;"><p style="margin:0;color:#666;font-size:14px;">${state.message}</p></div>`;
      }

      div.innerHTML = html;
      root.appendChild(div);
      wireGameEvents(state, isTeller, myPlayer);
    }

    function renderClaimPhase(state, isTeller) {
      const teller = state.players[state.storytellerId];
      if (isTeller) {
        return `<div style="margin-bottom:2rem;padding:20px;background:#e3f2fd;border:2px solid #2a78d6;border-radius:8px;">
          <h2 style="margin:0 0 12px 0;font-size:18px;font-weight:600;color:#1f5cab;">🗣️ あなたの番です</h2>
          <p style="color:#1f5cab;margin:0 0 16px 0;font-size:14px;">口頭でエピソードを話してください。話し終わったら、それが本当かウソかをここに入力します（他のプレイヤーには見えません）。</p>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
            <button id="claimTrue" style="padding:18px;font-size:16px;font-weight:600;background:#d4edda;color:#155724;border:2px solid #28a745;border-radius:8px;cursor:pointer;">✓ 本当の話</button>
            <button id="claimFalse" style="padding:18px;font-size:16px;font-weight:600;background:#f8d7da;color:#721c24;border:2px solid #dc3545;border-radius:8px;cursor:pointer;">✕ ウソの話</button>
          </div>
        </div>`;
      }
      return `<div style="margin-bottom:2rem;padding:20px;background:#f8f8f7;border:1px solid #e0e0e0;border-radius:8px;text-align:center;">
        <h2 style="margin:0 0 8px 0;font-size:18px;font-weight:600;color:#666;">🎧 ${teller ? teller.name : ''}さんのエピソードを聞いてください</h2>
        <p style="color:#999;margin:0;font-size:14px;">話が終わったら、ベット画面に切り替わります</p>
      </div>`;
    }

    function renderBettingPhase(state, isTeller, myPlayer) {
      if (isTeller) {
        const total = Object.keys(state.bets).length;
        const need = state.playerOrder.filter((id) => id !== state.storytellerId && state.players[id].status === 'active').length;
        return `<div style="margin-bottom:2rem;padding:20px;background:#f8f8f7;border:1px solid #e0e0e0;border-radius:8px;text-align:center;">
          <h2 style="margin:0 0 8px 0;font-size:18px;font-weight:600;color:#666;">⏳ みんなのベットを待っています</h2>
          <p style="color:#999;margin:0;font-size:14px;">${total} / ${need} 人がベット済み</p>
        </div>`;
      }
      if (myPlayer.status === 'broke') {
        return `<div style="margin-bottom:2rem;padding:20px;background:#f8f8f7;border:1px solid #e0e0e0;border-radius:8px;text-align:center;">
          <p style="color:#999;margin:0;font-size:14px;">あなたは破産しているので今回は観戦です</p>
        </div>`;
      }
      const myBet = state.bets[client.playerId];
      if (myBet && myBet.submitted && myBet.side) {
        return `<div style="margin-bottom:2rem;padding:20px;background:#e3f2fd;border:2px solid #2a78d6;border-radius:8px;text-align:center;">
          <p style="margin:0;color:#1f5cab;font-size:15px;">あなたのベット：<strong>${myBet.side}</strong> に $${myBet.amount}</p>
          <p style="margin:8px 0 0 0;color:#999;font-size:12px;">他のプレイヤーのベットを待っています…</p>
        </div>`;
      }
      const cap = Math.min(myPlayer.bankroll, 100);
      const side = client.pendingSide || '';
      return `<div style="margin-bottom:2rem;padding:20px;background:#e3f2fd;border:2px solid #2a78d6;border-radius:8px;">
        <h2 style="margin:0 0 12px 0;font-size:18px;font-weight:600;color:#1f5cab;">💰 本当かウソか、ベットしてください</h2>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px;">
          <button class="side-btn ${side === '本当' ? 'selected' : ''}" data-side="本当" style="padding:16px;font-size:16px;font-weight:600;background:#d4edda;color:#155724;border:2px solid #28a745;border-radius:8px;cursor:pointer;">✓ 本当</button>
          <button class="side-btn ${side === 'ウソ' ? 'selected' : ''}" data-side="ウソ" style="padding:16px;font-size:16px;font-weight:600;background:#f8d7da;color:#721c24;border:2px solid #dc3545;border-radius:8px;cursor:pointer;">✕ ウソ</button>
        </div>
        <p style="color:#1f5cab;margin:0 0 8px 0;font-size:14px;">残高: $${myPlayer.bankroll}</p>
        <input type="number" min="1" max="${cap}" id="betAmountInput" placeholder="ベット額を入力（最大$${cap}）" style="width:100%;padding:10px;margin-bottom:12px;font-size:16px;border-radius:6px;border:1px solid #90caf9;"/>
        <div style="display:grid;grid-template-columns:repeat(5, 1fr);gap:8px;margin-bottom:16px;">
          ${[10, 25, 50, 75, 100].map((amt) => `<button class="bet-amt-btn" data-amount="${amt}" style="padding:10px;font-size:13px;font-weight:600;background:white;border:1px solid #2a78d6;color:#2a78d6;border-radius:6px;cursor:pointer;opacity:${amt > cap ? 0.5 : 1};" ${amt > cap ? 'disabled' : ''}>$${amt}</button>`).join('')}
        </div>
        <button id="confirmBetBtn" style="width:100%;padding:12px;font-size:16px;font-weight:600;background:#2a78d6;color:white;border:none;border-radius:6px;cursor:pointer;">ベット確定 →</button>
      </div>`;
    }

    function renderRevealPhase(state) {
      const bgColor = state.claim === '本当' ? '#d4edda' : '#f8d7da';
      const borderColor = state.claim === '本当' ? '#28a745' : '#dc3545';
      const textColor = state.claim === '本当' ? '#155724' : '#721c24';
      const list = state.playerOrder.map((id) => state.players[id]).filter(Boolean);

      let html = `<div style="margin-bottom:2rem;padding:24px;background:${bgColor};border:3px solid ${borderColor};border-radius:8px;text-align:center;">
        <h2 style="margin:0 0 12px 0;font-size:24px;font-weight:600;color:${textColor};">${state.message}</h2>
        <div style="margin-bottom:16px;padding:12px;background:rgba(255,255,255,0.7);border-radius:6px;">
          <h3 style="margin:0 0 12px 0;font-size:13px;color:#666;text-transform:uppercase;">ラウンド結果</h3>
          <div style="display:grid;grid-template-columns:repeat(auto-fit, minmax(120px, 1fr));gap:8px;">`;

      list.forEach((p) => {
        if (p.id === state.storytellerId) {
          html += `<div style="font-size:12px;padding:8px;background:#fff3cd;border-radius:6px;"><span style="color:#999;">${p.name}</span><br/><span style="font-size:13px;color:#856404;">🗣️トーク役</span></div>`;
          return;
        }
        const bet = state.bets[p.id];
        if (!bet || !bet.side) {
          html += `<div style="font-size:12px;padding:8px;background:#f5f5f5;border-radius:6px;"><span style="color:#999;">${p.name}</span><br/><span style="font-size:13px;color:#999;">ベットなし</span></div>`;
          return;
        }
        const correct = bet.side === state.claim;
        const oddsValue = parseFloat(state.odds[bet.side]) || 1;
        const result = correct ? Math.round(bet.amount * oddsValue) - bet.amount : -bet.amount;
        html += `<div style="font-size:12px;padding:8px;background:${correct ? '#c8e6c9' : '#ffcdd2'};border-radius:6px;"><span style="color:#999;">${p.name}（${bet.side}に$${bet.amount}）</span><br/><span style="font-size:14px;font-weight:600;color:${correct ? '#2e7d32' : '#c62828'};">${result > 0 ? '+' : ''}${result}</span></div>`;
      });

      html += `</div></div><button id="nextRoundBtn" style="padding:12px 24px;font-size:16px;font-weight:600;background:${textColor};color:white;border:none;border-radius:6px;cursor:pointer;">次のラウンド →</button></div>`;
      return html;
    }

    function renderEnded(state) {
      const list = state.playerOrder.map((id) => state.players[id]).filter(Boolean)
        .sort((a, b) => b.bankroll - a.bankroll);
      const top = list[0];
      let html = `<div style="padding:24px;background:#fff3cd;border:3px solid #ffc107;border-radius:8px;text-align:center;">
        <h2 style="margin:0 0 16px 0;font-size:24px;font-weight:700;">🏆 ゲーム終了！</h2>
        <p style="margin:0 0 20px 0;font-size:16px;">優勝: <strong>${top ? top.name : ''}</strong>（$${top ? top.bankroll : 0}）</p>
        <div style="display:grid;gap:8px;">`;
      list.forEach((p, i) => {
        html += `<div style="padding:12px;background:#fff;border-radius:8px;display:flex;justify-content:space-between;"><span>${i + 1}位　${p.name}</span><span style="font-weight:600;">$${p.bankroll}</span></div>`;
      });
      html += `</div><p style="margin-top:20px;color:#999;font-size:13px;">新しいゲームを始めるにはページを再読み込みしてください</p></div>`;
      return html;
    }

    function wireGameEvents(state, isTeller, myPlayer) {
      if (state.gameState === 'claim' && isTeller) {
        document.getElementById('claimTrue').addEventListener('click', () => { client.socket.emit('submitClaim', '本当'); });
        document.getElementById('claimFalse').addEventListener('click', () => { client.socket.emit('submitClaim', 'ウソ'); });
      }

      if (state.gameState === 'betting' && !isTeller && myPlayer.status !== 'broke') {
        const myBet = state.bets[client.playerId];
        if (!myBet || !myBet.side) {
          document.querySelectorAll('.side-btn').forEach((btn) => {
            btn.addEventListener('click', () => {
              client.pendingSide = btn.dataset.side;
              render();
            });
          });
          document.querySelectorAll('.bet-amt-btn').forEach((btn) => {
            btn.addEventListener('click', () => {
              document.getElementById('betAmountInput').value = btn.dataset.amount;
            });
          });
          const confirmBtn = document.getElementById('confirmBetBtn');
          if (confirmBtn) {
            confirmBtn.addEventListener('click', () => {
              const amount = Number(document.getElementById('betAmountInput').value);
              if (!client.pendingSide) {
                alert('「本当」か「ウソ」を選んでください');
                return;
              }
              if (!amount || amount < 1) {
                alert('ベット額を入力してください');
                return;
              }
              client.socket.emit('placeBet', { side: client.pendingSide, amount });
              client.pendingSide = null;
            });
          }
        }
      }

      if (state.gameState === 'reveal') {
        const btn = document.getElementById('nextRoundBtn');
        if (btn) btn.addEventListener('click', () => { client.socket.emit('nextRound'); });
      }
    }

    render();
  </script>
</body>
</html>
